name: Giuseppe
options:
  bundleIdPrefix: com.giuseppe
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
    INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
    ENABLE_PREVIEWS: "YES"

targets:
  Giuseppe:
    type: application
    platform: iOS
    sources:
      - path: Giuseppe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.giuseppe.app
        INFOPLIST_KEY_CFBundleDisplayName: Giuseppe
        GENERATE_INFOPLIST_FILE: "YES"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
    preBuildScripts:
      - name: "SwiftLint"
        script: |
          if which swiftlint > /dev/null; then
            swiftlint
          fi
        basedOnDependencyAnalysis: false

  GiuseppeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GiuseppeTests
    dependencies:
      - target: Giuseppe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.giuseppe.tests
        GENERATE_INFOPLIST_FILE: "YES"

  GiuseppeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: GiuseppeUITests
    dependencies:
      - target: Giuseppe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.giuseppe.uitests
        GENERATE_INFOPLIST_FILE: "YES"
